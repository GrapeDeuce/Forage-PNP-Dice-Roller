<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * { box-sizing: border-box; }
            
            body {
                font-family: 'Trebuchet MS', 'Marker Felt', 'Impact', cursive, sans-serif;
                padding: 20px;
                background: #1a472a;
                min-height: 100vh;
                margin: 0;
            }
            
            .container {
                max-width: 1400px;
                margin: 0 auto;
            }
            
            h1 {
                color: white;
                text-align: center;
                margin-bottom: 30px;
            }
            
            .button-container {
                text-align: center;
                margin-bottom: 30px;
            }
            
            button {
                padding: 12px 30px;
                font-size: 16px;
                font-weight: bold;
                background: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                transition: all 0.3s ease;
            }
            
            button:hover:not(:disabled) {
                background: #764ba2;
                transform: scale(1.05);
            }
            
            button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            
            .initial-grid {
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 15px;
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .results-grid {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 30px;
                display: none;
            }
            
            .results-grid.show {
                display: grid;
            }
            
            .column {
                border-radius: 12px;
                padding: 20px;
            }
            
            .column:nth-of-type(1) {
                background: #FFE8F0;
            }
            
            .column:nth-of-type(2) {
                background: #D4C9B8;
            }
            
            .column:nth-of-type(3) {
                background: #D8E8D0;
            }
            
            .column h2 {
                color: #667eea;
                margin-top: 0;
                border-bottom: 2px solid #667eea;
                padding-bottom: 10px;
            }
            
            .row {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .scene {
                perspective: 1000px;
                height: 100px;
                width: 100px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            .die {
                width: 90px;
                height: 90px;
                position: relative;
                transform-style: preserve-3d;
            }
            
            .face {
                position: absolute;
                width: 100%;
                height: 100%;
                border: 2px solid rgba(255,255,255,0.3);
                border-radius: 6px;
                backface-visibility: hidden;
                overflow: hidden;
            }
            
            .face img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            
            .face1 { transform: translateZ(45px); }
            .face2 { transform: rotateY(180deg) translateZ(45px); }
            .face3 { transform: rotateY(90deg) translateZ(45px); }
            .face4 { transform: rotateY(-90deg) translateZ(45px); }
            .face5 { transform: rotateX(90deg) translateZ(45px); }
            .face6 { transform: rotateX(-90deg) translateZ(45px); }
            
            @media (max-width: 768px) {
                body {
                    padding: 12px;
                }
                
                h1 {
                    font-size: 24px;
                    margin-bottom: 20px;
                }
                
                .button-container {
                    margin-bottom: 20px;
                }
                
                button {
                    padding: 10px 20px;
                    font-size: 14px;
                }
                
                .initial-grid {
                    grid-template-columns: repeat(4, 1fr);
                    gap: 10px;
                    max-width: 100%;
                }
                
                .results-grid {
                    grid-template-columns: 1fr;
                    gap: 20px;
                }
                
                .column {
                    padding: 15px;
                }
                
                .column h2 {
                    font-size: 18px;
                    margin-bottom: 10px;
                }
                
                .scene {
                    height: 70px;
                    width: 70px;
                }
                
                .die {
                    width: 65px;
                    height: 65px;
                }
                
                .face1 { transform: translateZ(32.5px); }
                .face2 { transform: rotateY(180deg) translateZ(32.5px); }
                .face3 { transform: rotateY(90deg) translateZ(32.5px); }
                .face4 { transform: rotateY(-90deg) translateZ(32.5px); }
                .face5 { transform: rotateX(90deg) translateZ(32.5px); }
                .face6 { transform: rotateX(-90deg) translateZ(32.5px); }
                
                .row {
                    gap: 8px;
                    margin-bottom: 10px;
                    justify-content: center;
                }
            }
            
            @media (max-width: 480px) {
                body {
                    padding: 8px;
                }
                
                h1 {
                    font-size: 20px;
                    margin-bottom: 15px;
                }
                
                button {
                    padding: 8px 16px;
                    font-size: 13px;
                }
                
                .initial-grid {
                    grid-template-columns: repeat(3, 1fr);
                    gap: 8px;
                }
                
                .results-grid {
                    gap: 15px;
                }
                
                .column {
                    padding: 12px;
                }
                
                .column h2 {
                    font-size: 16px;
                    margin-bottom: 8px;
                }
                
                .scene {
                    height: 60px;
                    width: 60px;
                }
                
                .die {
                    width: 55px;
                    height: 55px;
                }
                
                .face1 { transform: translateZ(27.5px); }
                .face2 { transform: rotateY(180deg) translateZ(27.5px); }
                .face3 { transform: rotateY(90deg) translateZ(27.5px); }
                .face4 { transform: rotateY(-90deg) translateZ(27.5px); }
                .face5 { transform: rotateX(90deg) translateZ(27.5px); }
                .face6 { transform: rotateX(-90deg) translateZ(27.5px); }
                
                .row {
                    gap: 6px;
                    margin-bottom: 8px;
                    justify-content: center;
                }
            }
        </style>
    </head>
    <script>
        const items = ["Fiddlehead", "Huckleberry", "Morel Mushroom", "Porcini Mushroom", "Salmonberry", "Stinging Nettle"];
        const faceRotations = [{x:0,y:0}, {x:0,y:180}, {x:0,y:90}, {x:0,y:-90}, {x:90,y:0}, {x:-90,y:0}];
        
        let diceResults = [];
        let isRolling = false;
        
        function createDie(index) {
            return `<div class="scene">
                <div class="die" data-die="${index}" style="transform: rotateX(0deg) rotateY(0deg);">
                    <div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="Fiddlehead"></div>
                    <div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="Huckleberry"></div>
                    <div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="Morel Mushroom"></div>
                    <div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="Porcini Mushroom"></div>
                    <div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="Salmonberry"></div>
                    <div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="Stinging Nettle"></div>
                </div>
            </div>`;
        }
        
        function handleButtonClick() {
            const resultsGrid = document.querySelector(".results-grid");
            if(resultsGrid.classList.contains("show")) {
                rollAgain();
            } else {
                rollAllDice();
            }
        }
        
        function rollAllDice() {
            if(isRolling) return;
            isRolling = true;
            document.querySelector("button").disabled = true;
            
            diceResults = Array(8).fill(0).map(() => Math.floor(Math.random() * 6));
            
            let rotation = 0;
            const spinInterval = setInterval(() => {
                rotation += 20;
                // Only animate the 7 dice in initial-grid
                document.querySelector(".initial-grid").querySelectorAll(".die").forEach(die => {
                    die.style.transform = `rotateX(${rotation}deg) rotateY(${rotation * 1.5}deg)`;
                });
            }, 16);
            
            setTimeout(() => {
                clearInterval(spinInterval);
                
                // Update all 8 dice in initial-grid
                document.querySelector(".initial-grid").querySelectorAll(".die").forEach((die, index) => {
                    const result = diceResults[index];
                    const target = faceRotations[result];
                    die.style.transform = `rotateX(${target.x}deg) rotateY(${target.y}deg)`;
                    die.dataset.result = result;
                });
                
                setTimeout(() => {
                    showResults();
                    isRolling = false;
                    document.querySelector("button").disabled = false;
                }, 300);
            }, 1000);
        }
        
        function showResults() {
            const initialGrid = document.querySelector(".initial-grid");
            const resultsGrid = document.querySelector(".results-grid");
            const button = document.querySelector("button");
            
            initialGrid.style.display = "none";
            resultsGrid.classList.add("show");
            button.textContent = "🎲 Roll Again";
            
            // Get all 8 dice
            const allDice = Array.from(document.querySelector(".initial-grid").querySelectorAll(".die"));
            
            // Pick a random die for the middle
            const randomIndex = Math.floor(Math.random() * 8);
            const middleDie = allDice[randomIndex];
            const remainingDice = allDice.filter((_, index) => index !== randomIndex);
            
            // Group remaining 7 dice by result
            const groups = {};
            remainingDice.forEach((die) => {
                const result = parseInt(die.dataset.result);
                const itemName = items[result];
                if(!groups[itemName]) groups[itemName] = [];
                groups[itemName].push(die.parentElement.innerHTML);
            });
            
            // Separate pantry (2+) and exploration (1)
            const pantry = Object.entries(groups).filter(([_, dice]) => dice.length > 1).sort((a,b) => b[1].length - a[1].length);
            const exploration = Object.entries(groups).filter(([_, dice]) => dice.length === 1).sort((a,b) => a[0].localeCompare(b[0]));
            
            // Build pantry column
            let pantryHTML = '<h2>🥫 Pantry</h2>';
            pantry.forEach(([name, dice]) => {
                pantryHTML += '<div class="row">' + dice.join('') + '</div>';
            });
            document.querySelector(".column:nth-of-type(1)").innerHTML = pantryHTML;
            
            // Build middle column with random die
            let middleHTML = '<h2>🌿 Wild</h2>';
            middleHTML += '<div class="row">' + middleDie.parentElement.innerHTML + '</div>';
            document.querySelector(".column:nth-of-type(2)").innerHTML = middleHTML;
            
            // Build exploration column
            let explorationHTML = '<h2>🧭 Exploration</h2>';
            exploration.forEach(([name, dice]) => {
                explorationHTML += '<div class="row">' + dice.join('') + '</div>';
            });
            document.querySelector(".column:nth-of-type(3)").innerHTML = explorationHTML;
        }
        
        function rollAgain() {
            // Clear results columns first
            document.querySelector(".column:nth-of-type(1)").innerHTML = '';
            document.querySelector(".column:nth-of-type(2)").innerHTML = '';
            document.querySelector(".column:nth-of-type(3)").innerHTML = '';
            
            document.querySelector(".initial-grid").style.display = "grid";
            document.querySelector(".results-grid").classList.remove("show");
            document.querySelector("button").textContent = "🎲 Roll Dice";
            isRolling = false;
            rollAllDice();
        }
    </script>
    <body>
        <div class="container">
            <h1>🥾 Forage PNP Dice Roller</h1>
            
            <div class="button-container">
                <button onclick="handleButtonClick()">🎲 Roll Dice</button>
            </div>
            
            <div class="initial-grid">
                <div class="scene"><div class="die" data-die="0" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="1" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="2" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="3" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="4" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="5" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="6" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
                <div class="scene"><div class="die" data-die="7" style="transform: rotateX(0deg) rotateY(0deg);"><div class="face face1"><img src="Forage - White Die/Fiddlehead.png" alt="f"></div><div class="face face2"><img src="Forage - White Die/Huckleberry.png" alt="h"></div><div class="face face3"><img src="Forage - White Die/Morel Mushroom.png" alt="m"></div><div class="face face4"><img src="Forage - White Die/Porcini Mushroom.png" alt="p"></div><div class="face face5"><img src="Forage - White Die/Salmonberry.png" alt="s"></div><div class="face face6"><img src="Forage - White Die/Stinging Nettle.png" alt="n"></div></div></div>
            </div>
            
            <div class="results-grid">
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
            </div>
        </div>
    </body>
</html>
